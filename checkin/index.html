<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Check-in — Navkar Token System</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="top-bar">
    <div class="brand">
      <img src="../assets/images/logo.png" alt="Navkar">
      <div>
        <h1>Navkar Token System</h1>
        <span>Customer Check-in</span>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card" id="checkin-card">
      <div class="card-title">New Customer Check-in</div>

      <div class="error-msg" id="errorMsg"></div>

      <div id="formSection">
        <div class="form-group search-wrapper">
          <label>Registered Party (search by name or code)</label>
          <input type="text" class="form-control" id="partySearch"
                 placeholder="Type to search medical store..." autocomplete="off">
          <div class="dropdown-list" id="partyDropdown"></div>
        </div>

        <div class="divider">OR</div>

        <div class="form-group">
          <label>Walk-in Customer Name</label>
          <input type="text" class="form-control" id="walkinName"
                 placeholder="Enter name if not in list" disabled>
        </div>

        <div class="form-group">
          <label>Mobile Number (10 digits)</label>
          <input type="tel" class="form-control" id="mobileNumber"
                 placeholder="9876543210" maxlength="10" inputmode="numeric" pattern="[0-9]*">
        </div>

        <button class="btn btn-primary btn-block"
                id="generateBtn"
                style="background:#F7D02B;color:#212121;"
                onclick="generateToken()">
          Generate Token
        </button>
      </div>

      <div id="confirmationSection" style="display:none;">
        <div class="confirmation-card">
          <div style="font-size:16px;color:var(--text-secondary);">Your Daily Token</div>
          <div class="big-token" id="tokenNumberDisplay">T-1</div>
          <div class="sub-text">Delivery Target: <span id="targetDisplay">20</span> Mins</div>
          <div style="font-size:15px;margin-top:8px;" id="partyDisplay"></div>
          <button class="btn btn-primary"
                  onclick="resetForm()"
                  style="margin-top:20px;">
            Check-in Another Customer
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script>
    // Global UI state
    let selectedParty = null;
    let allParties = [];
    let searchTimeout = null;

    document.addEventListener('DOMContentLoaded', () => {
      loadParties();
      setupSearchListener();
    });

    // -----------------------------------------------------------------
    // Load parties for the dropdown
    // -----------------------------------------------------------------
    function loadParties() {
      db.collection('parties').get()
        .then(snapshot => {
          allParties = [];
          snapshot.forEach(doc => {
            const data = doc.data();
            allParties.push({ id: doc.id, code: data.code, name: data.name });
          });
          allParties.sort((a, b) => a.code.localeCompare(b.code, undefined, { numeric: true }));
        })
        .catch(err => console.warn('Parties load failed:', err));
    }
    // -----------------------------------------------------------------
    // Search dropdown handling
    // -----------------------------------------------------------------
    function setupSearchListener() {
      const input = document.getElementById('partySearch');
      const dropdown = document.getElementById('partyDropdown');

      input.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          const query = input.value.trim().toLowerCase();
          if (!query) { dropdown.classList.remove('show'); return; }

          const filtered = allParties.filter(p =>
            p.code.toLowerCase().includes(query) ||
            p.name.toLowerCase().includes(query)
          );

          dropdown.innerHTML = '';
          if (!filtered.length) {
            dropdown.innerHTML = '<div class="dropdown-item" style="color:#999;">No parties found</div>';
          } else {
            filtered.slice(0, 50).forEach(p => {
              const div = document.createElement('div');
              div.className = 'dropdown-item';
              div.innerHTML = `<span class="code">${p.code}</span><span class="name">${p.name}</span>`;
              div.onclick = () => selectParty(p);
              dropdown.appendChild(div);
            });
          }
          dropdown.classList.add('show');
        }, 200);
      });

      input.addEventListener('blur', () => {
        setTimeout(() => dropdown.classList.remove('show'), 200);
      });
    }

    function selectParty(party) {
      selectedParty = party;
      document.getElementById('partySearch').value = `${party.code} - ${party.name}`;
      document.getElementById('partyDropdown').classList.remove('show');
      document.getElementById('walkinName').disabled = true;
      document.getElementById('walkinName').value = '';
    }

    document.getElementById('partySearch').addEventListener('focus', () => {
      if (selectedParty) {
        selectedParty = null;
        document.getElementById('walkinName').disabled = false;
      }
    });

    // -----------------------------------------------------------------
    // Mobile number sanitisation
    // -----------------------------------------------------------------
    document.getElementById('mobileNumber').addEventListener('input', e => {
      e.target.value = e.target.value.replace(/\D/g, '').slice(0, 10);
    });

    // -----------------------------------------------------------------
    // Helper: simple delay (Promise) for back‑off
    // -----------------------------------------------------------------
    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    // -----------------------------------------------------------------
    // Get next token number using a Firestore transaction (with retries)
    // Guarantees unique numbers even with concurrent requests
    // -----------------------------------------------------------------
    async function getNextTokenNumber(date, maxRetries = 15) {
      const counterRef = db.collection('counters').doc(date);
      let attempt = 0;
      while (attempt <= maxRetries) {
        try {
          return await db.runTransaction(async t => {
            const doc = await t.get(counterRef);
            let count = 0;
            if (doc.exists) count = doc.data().count || 0;
            const newCount = count + 1;
            t.set(counterRef, { count: newCount }, { merge: true });
            return `T-${newCount}`;
          });
        } catch (err) {
          const is429 = err.code === 'resource-exhausted' || err.code === 'aborted' || (err.message && err.message.includes('429'));
          if (is429 && attempt < maxRetries) {
            const backoff = Math.pow(3, attempt) * 300; // 300ms, 900ms, 2700ms, …
            console.warn(`Retry ${attempt + 1}/${maxRetries} – waiting ${backoff}ms`);
            await delay(backoff);
            attempt++;
          } else {
            throw err;
          }
        }
      }
      throw new Error('Transaction failed after all retries');
    }

    // -----------------------------------------------------------------
    // Main token generation flow
    // -----------------------------------------------------------------
    async function generateToken() {
      const errorEl = document.getElementById('errorMsg');
      errorEl.classList.remove('show');
      errorEl.textContent = '';

      const customerName = selectedParty ? selectedParty.name : document.getElementById('walkinName').value.trim();
      if (!customerName) {
        showError('Please select a registered party or enter a walk‑in name');
        return;
      }
      const mobile = document.getElementById('mobileNumber').value.trim();
      if (mobile.length !== 10) {
        showError('Please enter a valid 10‑digit mobile number');
        return;
      }

      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      btn.textContent = 'Generating...';

      const now = new Date();
      const today = formatDate(now);
      const checkInTime = now.getTime();

      let tokenNum;
      try {
        tokenNum = await getNextTokenNumber(today);
      } catch (err) {
        console.error('Transaction failed:', err);
        showError('Server busy. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Generate Token';
        return;
      }

      try {
        await db.collection('tokens').doc(tokenNum).set({
          tokenNumber: tokenNum,
          customerCode: selectedParty ? selectedParty.code : null,
          customerName: customerName,
          isRegisteredParty: selectedParty !== null,
          mobileNumber: mobile,
          checkInTimeMillis: checkInTime,
          targetMinutes: 20,
          status: 'WAITING',
          receiverName: null,
          receiverPhone: null,
          deliveryTimeMillis: null,
          waitMinutes: null,
          date: today
        });
        showConfirmation({ tokenNumber: tokenNum, customerName, isRegisteredParty: selectedParty !== null });
      } catch (writeErr) {
        console.error('Error writing token document:', writeErr);
        showError('Failed to generate token: ' + (writeErr.message || writeErr));
        btn.disabled = false;
        btn.textContent = 'Generate Token';
      }
    }

    // -----------------------------------------------------------------
    // UI helpers
    // -----------------------------------------------------------------
    function showConfirmation(data) {
      document.getElementById('formSection').style.display = 'none';
      document.getElementById('confirmationSection').style.display = 'block';
      document.getElementById('tokenNumberDisplay').textContent = data.tokenNumber;
      document.getElementById('partyDisplay').textContent = data.customerName ? `Party: ${data.customerName}` : '';
    }

    function resetForm() {
      selectedParty = null;
      document.getElementById('formSection').style.display = 'block';
      document.getElementById('confirmationSection').style.display = 'none';
      document.getElementById('partySearch').value = '';
      document.getElementById('walkinName').value = '';
      document.getElementById('walkinName').disabled = false;
      document.getElementById('mobileNumber').value = '';
      const btn = document.getElementById('generateBtn');
      btn.disabled = false;
      btn.textContent = 'Generate Token';
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
