<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Check-in — Token System Navkar</title>
  <link rel="stylesheet" href="../assets/css/style.css?v=2">
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="top-bar">
    <div class="brand">
      <img src="../assets/images/logo.png" alt="Navkar" style="height:40px;width:auto;border-radius:8px;">
      <div>
        <h1>Token System Navkar</h1>
        <div class="sub">Customer Check-in</div>
      </div>
    </div>
    <div class="nav-links">
      <a href="../checkin/" class="active">Check-in</a>
      <a href="../floor-display/">Floor Display</a>
      <a href="../report/">Daily Report</a>
    </div>
  </div>

  <div class="container fade-in">
    <div class="card" id="checkin-card">
      <div class="card-title">New Customer Check-in</div>
      <div class="card-subtitle">Select your medical store or enter as walk-in customer</div>

      <div class="error-msg" id="errorMsg"></div>

      <div id="formSection">
        <div class="form-group search-wrapper">
          <label>Registered Party</label>
          <input type="text" class="form-control" id="partySearch"
                 placeholder="Search by name or code..." autocomplete="off">
          <div class="dropdown-list" id="partyDropdown"></div>
        </div>

        <div class="divider">OR</div>

        <div class="form-group">
          <label>Walk-in Customer Name</label>
          <input type="text" class="form-control" id="walkinName"
                 placeholder="Enter name if not registered" disabled>
        </div>

        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" class="form-control" id="mobileNumber"
                 placeholder="Enter 10-digit mobile number" maxlength="10" inputmode="numeric" pattern="[0-9]*">
        </div>

        <button class="btn btn-primary btn-block" id="generateBtn" onclick="generateToken()">
          Generate Token
        </button>
      </div>

      <div id="confirmationSection" style="display:none;">
        <div class="confirmation-card">
          <div class="check-icon">&#10003;</div>
          <div style="font-size:15px;color:var(--text-secondary);font-weight:500;">Your Daily Token</div>
          <div class="big-token" id="tokenNumberDisplay">T-1</div>
          <div class="sub-text">Delivery Target: <span id="targetDisplay">20</span> Minutes</div>
          <div style="font-size:15px;margin-top:10px;color:var(--text-secondary);" id="partyDisplay"></div>
          <button class="btn btn-primary" onclick="resetForm()" style="margin-top:24px;">
            Check-in Another Customer
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script>
    let selectedParty = null;
    let allParties = [];
    let searchTimeout = null;

    document.addEventListener('DOMContentLoaded', () => {
      loadParties();
      setupSearchListener();
    });

    function loadParties() {
      db.collection("parties").get()
        .then(snapshot => {
          allParties = [];
          snapshot.forEach(doc => {
            const data = doc.data();
            allParties.push({ id: doc.id, code: data.code, name: data.name });
          });
          allParties.sort((a, b) => a.code.localeCompare(b.code, undefined, { numeric: true }));
        })
        .catch(err => console.warn("Parties load failed:", err));
    }

    function setupSearchListener() {
      const input = document.getElementById('partySearch');
      const dropdown = document.getElementById('partyDropdown');

      input.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          const query = input.value.trim().toLowerCase();
          if (query.length === 0) {
            dropdown.classList.remove('show');
            return;
          }
          const filtered = allParties.filter(p =>
            p.code.toLowerCase().includes(query) ||
            p.name.toLowerCase().includes(query)
          );
          dropdown.innerHTML = '';
          if (filtered.length === 0) {
            dropdown.innerHTML = '<div class="dropdown-item" style="color:var(--text-muted);">No parties found</div>';
          } else {
            filtered.slice(0, 50).forEach(p => {
              const div = document.createElement('div');
              div.className = 'dropdown-item';
              div.innerHTML = `<span class="code">${p.code}</span><span class="name">${p.name}</span>`;
              div.onclick = () => selectParty(p);
              dropdown.appendChild(div);
            });
          }
          dropdown.classList.add('show');
        }, 200);
      });

      input.addEventListener('blur', () => {
        setTimeout(() => dropdown.classList.remove('show'), 200);
      });
    }

    function selectParty(party) {
      selectedParty = party;
      document.getElementById('partySearch').value = `${party.code} - ${party.name}`;
      document.getElementById('partyDropdown').classList.remove('show');
      document.getElementById('walkinName').disabled = true;
      document.getElementById('walkinName').value = '';
    }

    document.getElementById('partySearch').addEventListener('focus', () => {
      if (selectedParty) {
        selectedParty = null;
        document.getElementById('walkinName').disabled = false;
      }
    });

    document.getElementById('mobileNumber').addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '').slice(0, 10);
    });

    function generateToken() {
      const errorEl = document.getElementById('errorMsg');
      errorEl.classList.remove('show');
      errorEl.textContent = '';

      const customerName = selectedParty ? selectedParty.name : document.getElementById('walkinName').value.trim();
      if (!customerName) {
        showError('Please select a registered party or enter a walk-in name');
        return;
      }
      const mobile = document.getElementById('mobileNumber').value.trim();
      if (mobile.length !== 10) {
        showError('Please enter a valid 10-digit mobile number');
        return;
      }

      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      btn.textContent = 'Generating...';

      const now = new Date();
      const today = formatDate(now);
      const checkInTime = now.getTime();

      const timeout = setTimeout(() => {
        showError('Request timed out. Check your internet and Firestore rules.');
        btn.disabled = false;
        btn.textContent = 'Generate Token';
      }, 15000);

      db.collection("tokens").get()
        .then(snapshot => {
          let count = 0;
          snapshot.forEach(doc => {
            if (doc.data().date === today) count++;
          });
          const tokenNum = `T-${count + 1}`;

          return db.collection("tokens").add({
            tokenNumber: tokenNum,
            customerCode: selectedParty ? selectedParty.code : null,
            customerName: customerName,
            isRegisteredParty: selectedParty !== null,
            mobileNumber: mobile,
            checkInTimeMillis: checkInTime,
            targetMinutes: 20,
            status: "WAITING",
            receiverName: null,
            receiverPhone: null,
            deliveryTimeMillis: null,
            waitMinutes: null,
            date: today
          }).then(() => {
            clearTimeout(timeout);
            return tokenNum;
          });
        })
        .then(tokenNum => {
          showConfirmation({
            tokenNumber: tokenNum,
            customerName: customerName,
            isRegisteredParty: selectedParty !== null
          });
        })
        .catch(err => {
          clearTimeout(timeout);
          showError('Failed to generate token: ' + err.message);
          console.error('Token generation error:', err);
          btn.disabled = false;
          btn.textContent = 'Generate Token';
        });
    }

    function showConfirmation(data) {
      document.getElementById('formSection').style.display = 'none';
      document.getElementById('confirmationSection').style.display = 'block';
      document.getElementById('tokenNumberDisplay').textContent = data.tokenNumber;
      document.getElementById('partyDisplay').textContent =
        data.customerName ? `Party: ${data.customerName}` : '';
    }

    function resetForm() {
      selectedParty = null;
      document.getElementById('formSection').style.display = 'block';
      document.getElementById('confirmationSection').style.display = 'none';
      document.getElementById('partySearch').value = '';
      document.getElementById('walkinName').value = '';
      document.getElementById('walkinName').disabled = false;
      document.getElementById('mobileNumber').value = '';
      document.getElementById('generateBtn').disabled = false;
      document.getElementById('generateBtn').textContent = 'Generate Token';
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }
  </script>
</body>
</html>
